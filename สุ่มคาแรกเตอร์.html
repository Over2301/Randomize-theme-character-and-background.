<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Spinner 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0b1a;
    --surface: #16132b;
    --card: #1e1a36;
    --border: #2e2855;
    --gold: #f5c842;
    --purple: #9b6dff;
    --pink: #ff6eb4;
    --cyan: #4ddde0;
    --green: #6bffb8;
    --orange: #ff9f4a;
    --text: #e8e0ff;
    --muted: #7a72a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 85%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 35% 15%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 50%, rgba(255,255,255,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }
  header { text-align: center; padding: 2rem 0 2rem; }
  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4.5vw, 2.5rem);
    background: linear-gradient(135deg, var(--gold), var(--purple), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
    margin-bottom: 0.4rem;
  }
  .subtitle { color: var(--muted); font-size: 0.9rem; font-weight: 600; }

  /* Category tabs */
  .category-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: center;
    margin-bottom: 1.8rem;
  }
  .cat-tab {
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 1rem;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: all 0.2s;
  }
  .cat-tab:hover, .cat-tab.active { border-color: var(--purple); color: var(--purple); background: rgba(155,109,255,0.12); }

  .spin-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    margin-bottom: 2.5rem;
  }
  .wheel-wrap { position: relative; width: 200px; height: 200px; }
  #wheel-canvas { border-radius: 50%; display: block; }
  .wheel-pointer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
    background: #fff;
    border-radius: 50%;
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 3px var(--gold);
    z-index: 2;
  }
  .spin-btn {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: #fff;
    border: none;
    padding: 0.85rem 2.8rem;
    border-radius: 50px;
    font-size: 1.1rem;
    font-weight: 800;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 30px rgba(155,109,255,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .spin-btn:hover { transform: scale(1.04); box-shadow: 0 6px 36px rgba(155,109,255,0.55); }
  .spin-btn:active { transform: scale(0.97); }
  .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Result section */
  #result-section {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.5s, transform 0.5s;
    pointer-events: none;
  }
  #result-section.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: all;
  }

  /* Category groups */
  .cat-group {
    margin-bottom: 2rem;
  }
  .cat-group-title {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.8rem;
    padding-left: 0.3rem;
    border-left: 3px solid var(--border);
    padding-left: 0.7rem;
  }
  .traits-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0.7rem;
  }

  .trait-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .trait-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 12px 0 0 12px;
  }
  .trait-card:hover { transform: translateY(-1px); }
  .trait-card.spinning .trait-value { animation: slot 0.07s steps(1) infinite; }
  @keyframes slot { 0%{opacity:1} 50%{opacity:0.3} }

  .trait-icon { font-size: 1.2rem; flex-shrink: 0; width: 28px; text-align: center; }
  .trait-info { flex: 1; min-width: 0; }
  .trait-label {
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 0.15rem;
    opacity: 0.75;
  }
  .trait-value {
    font-size: 0.88rem;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .reroll-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.95rem;
    padding: 0.2rem;
    border-radius: 6px;
    transition: color 0.2s, transform 0.3s;
    flex-shrink: 0;
  }
  .reroll-btn:hover { color: var(--text); transform: rotate(180deg); }

  /* accent colors */
  .c1::before{background:#ff9f4a} .c1 .trait-label{color:#ff9f4a}
  .c2::before{background:#9b6dff} .c2 .trait-label{color:#9b6dff}
  .c3::before{background:#ff6eb4} .c3 .trait-label{color:#ff6eb4}
  .c4::before{background:#4ddde0} .c4 .trait-label{color:#4ddde0}
  .c5::before{background:#6bffb8} .c5 .trait-label{color:#6bffb8}
  .c6::before{background:#f5c842} .c6 .trait-label{color:#f5c842}
  .c7::before{background:#e473ff} .c7 .trait-label{color:#e473ff}
  .c8::before{background:#7ec8ff} .c8 .trait-label{color:#7ec8ff}
  .c9::before{background:#b8ff6e} .c9 .trait-label{color:#b8ff6e}
  .c10::before{background:#ffb347} .c10 .trait-label{color:#ffb347}
  .c11::before{background:#ff7070} .c11 .trait-label{color:#ff7070}
  .c12::before{background:#70c8ff} .c12 .trait-label{color:#70c8ff}

  .actions {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }
  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
    padding: 0.6rem 1.5rem;
    border-radius: 50px;
    font-size: 0.88rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: border-color 0.2s, background 0.2s;
  }
  .btn-outline:hover { border-color: var(--purple); background: rgba(155,109,255,0.1); }

  /* Particles */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    border-radius: 50%;
    animation: particle-up 1.2s ease-out forwards;
  }
  @keyframes particle-up {
    0%{opacity:1;transform:translate(0,0) scale(1)}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-backdrop.open { opacity:1; pointer-events:all; }
  .modal {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 1.8rem;
    max-width: 520px;
    width: 90%;
    text-align: center;
  }
  .modal h3 { font-family:'Cinzel Decorative',serif; color:var(--gold); margin-bottom:1rem; font-size:1rem; }
  .modal pre {
    background: var(--card);
    border-radius: 10px;
    padding: 1rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    line-height: 1.9;
    text-align: left;
    color: var(--text);
    white-space: pre-wrap;
    margin-bottom: 1rem;
    max-height: 400px;
    overflow-y: auto;
  }
  .modal-close {
    background: var(--purple); color:#fff; border:none;
    padding: 0.55rem 1.5rem; border-radius:50px;
    font-weight:800; cursor:pointer;
    font-family:'Nunito',sans-serif; margin-right:0.5rem;
  }
  .copy-done { color:var(--green); font-size:0.78rem; margin-top:0.5rem; opacity:0; transition:opacity 0.3s; }
  .copy-done.show { opacity:1; }

  @media(max-width:500px){
    .traits-grid{grid-template-columns:1fr 1fr;}
    .trait-value{font-size:0.78rem;}
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">✦ Character Spinner ✦</div>
    <div class="subtitle">หมุนวงล้อ · รับคาแรกเตอร์ · วาดเลย!</div>
  </header>

  <div class="spin-zone">
    <div class="wheel-wrap">
      <canvas id="wheel-canvas" width="200" height="200"></canvas>
      <div class="wheel-pointer"></div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spinAll()">🎲 สุ่มคาแรกเตอร์!</button>
  </div>

  <div id="result-section">
    <div id="traits-container"></div>
    <div class="actions">
      <button class="btn-outline" onclick="spinAll()">🔄 สุ่มใหม่ทั้งหมด</button>
      <button class="btn-outline" onclick="showSheet()">📋 คัดลอก Sheet</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h3>📋 Character Sheet</h3>
    <pre id="sheet-text"></pre>
    <button class="modal-close" onclick="copySheet()">คัดลอก</button>
    <button class="btn-outline" onclick="document.getElementById('modal').classList.remove('open')" style="font-size:0.82rem">ปิด</button>
    <div class="copy-done" id="copy-done">✓ คัดลอกแล้ว!</div>
  </div>
</div>

let currentValues = {};
let isSpinning = false;

// Draw wheel
const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
const WHEEL_COLORS = ['#9b6dff','#ff6eb4','#4ddde0','#f5c842','#6bffb8','#ff9f4a','#e473ff','#7ec8ff','#b8ff6e','#ffb347','#ff7070','#70c8ff','#9b6dff','#ff6eb4'];
let wheelAngle = 0;
let wheelAnim = null;
const allTraits = CATEGORIES.flatMap(c => c.traits);

function drawWheel(angle) {
  const cx = 100, cy = 100, r = 94;
  const slices = CATEGORIES.length;
  const arc = (Math.PI * 2) / slices;
  ctx.clearRect(0, 0, 200, 200);
  ctx.save();
  ctx.shadowColor = '#9b6dff';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.arc(cx, cy, r + 2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(155,109,255,0.35)';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();
  for (let i = 0; i < slices; i++) {
    const start = angle + i * arc;
    const end = start + arc;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx.globalAlpha = 0.82;
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = '#0d0b1a';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.translate(r * 0.6, 0);
    ctx.rotate(-start - arc / 2 - angle);
    ctx.font = '13px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(CATEGORIES[i].label.split(' ')[0], 0, 0);
    ctx.restore();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = '#0d0b1a';
  ctx.fill();
  ctx.strokeStyle = '#2e2855';
  ctx.lineWidth = 2;
  ctx.stroke();
}
drawWheel(0);

function animateWheel(duration, endAngle, onDone) {
  const start = performance.now();
  const startAngle = wheelAngle;
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 4);
    wheelAngle = startAngle + (endAngle - startAngle) * ease;
    drawWheel(wheelAngle);
    if (t < 1) { wheelAnim = requestAnimationFrame(frame); }
    else { wheelAngle = endAngle; drawWheel(endAngle); onDone && onDone(); }
  }
  wheelAnim = requestAnimationFrame(frame);
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function buildLayout() {
  const container = document.getElementById('traits-container');
  container.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const group = document.createElement('div');
    group.className = 'cat-group';
    group.id = `group-${cat.id}`;
    const title = document.createElement('div');
    title.className = 'cat-group-title';
    title.textContent = cat.label;
    group.appendChild(title);
    const grid = document.createElement('div');
    grid.className = 'traits-grid';
    cat.traits.forEach(t => {
      const card = document.createElement('div');
      card.className = `trait-card ${t.cls}`;
      card.id = `card-${t.key}`;
      card.innerHTML = `
        <div class="trait-icon">${t.icon}</div>
        <div class="trait-info">
          <div class="trait-label">${t.label}</div>
          <div class="trait-value" id="val-${t.key}">—</div>
        </div>
        <button class="reroll-btn" title="สุ่มใหม่" onclick="rerollOne('${t.key}')">↻</button>
      `;
      grid.appendChild(card);
    });
    group.appendChild(grid);
    container.appendChild(group);
  });
}

function rerollOne(key) {
  const t = allTraits.find(x => x.key === key);
  if (!t) return;
  const card = document.getElementById(`card-${key}`);
  card.classList.add('spinning');
  let count = 0;
  const iv = setInterval(() => {
    document.getElementById(`val-${key}`).textContent = pick(t.values);
    count++;
    if (count >= 12) {
      clearInterval(iv);
      const val = pick(t.values);
      currentValues[key] = val;
      document.getElementById(`val-${key}`).textContent = val;
      card.classList.remove('spinning');
    }
  }, 60);
}

function spinAll() {
  if (isSpinning) return;
  isSpinning = true;
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;

  const spins = 4 + Math.random() * 3;
  const endAngle = wheelAngle + spins * Math.PI * 2 + Math.random() * Math.PI * 2;
  if (wheelAnim) cancelAnimationFrame(wheelAnim);
  animateWheel(2200, endAngle, () => {});

  buildLayout();
  document.getElementById('result-section').classList.add('visible');

  allTraits.forEach((t, i) => {
    let count = 0;
    const total = 12 + Math.floor(Math.random() * 8);
    setTimeout(() => {
      const card = document.getElementById(`card-${t.key}`);
      if (!card) return;
      card.classList.add('spinning');
      const iv = setInterval(() => {
        const el = document.getElementById(`val-${t.key}`);
        if (el) el.textContent = pick(t.values);
        count++;
        if (count >= total) {
          clearInterval(iv);
          const val = pick(t.values);
          currentValues[t.key] = val;
          if (el) el.textContent = val;
          card.classList.remove('spinning');
          if (i === allTraits.length - 1) {
            isSpinning = false;
            btn.disabled = false;
            spawnParticles();
          }
        }
      }, 65);
    }, i * 35);
  });
}

function spawnParticles() {
  const cols = ['#9b6dff','#ff6eb4','#4ddde0','#f5c842','#6bffb8','#ff9f4a'];
  const btn = document.getElementById('spin-btn');
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 32; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 5 + Math.random() * 9;
    const dx = (Math.random() - 0.5) * 220;
    const dy = -70 - Math.random() * 170;
    p.style.cssText = `left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${cols[Math.floor(Math.random()*cols.length)]};--dx:${dx}px;--dy:${dy}px;animation-delay:${Math.random()*0.3}s;animation-duration:${0.8+Math.random()*0.6}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1600);
  }
}

function showSheet() {
  const lines = ['✦ CHARACTER SHEET ✦', ''];
  CATEGORIES.forEach(cat => {
    lines.push(`── ${cat.label} ──`);
    cat.traits.forEach(t => {
      const val = currentValues[t.key] || '—';
      lines.push(`  ${t.icon} ${t.label} : ${val}`);
    });
    lines.push('');
  });
  document.getElementById('sheet-text').textContent = lines.join('\n');
  document.getElementById('modal').classList.add('open');
}

function copySheet() {
  const text = document.getElementById('sheet-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const el = document.getElementById('copy-done');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  });
}

function closeModal(e) {
  if (e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
}
