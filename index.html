<style>
  :root{--bg:#141414;--ink:#e8e0d8;--accentA:#ff6b35;--accentB:#3a9fd4;--line:#444;}
  *{box-sizing:border-box;}
  body{margin:0;min-height:100vh;background:var(--bg);font-family:'Trebuchet MS','Segoe UI',sans-serif;color:var(--ink);display:flex;flex-direction:column;align-items:center;padding:24px 16px 50px;}
  h1{font-size:1.4rem;margin:8px 0 4px;text-align:center;}
  p.sub{margin:0 0 24px;opacity:.7;font-size:.88rem;text-align:center;}
  .columns{display:flex;flex-wrap:wrap;gap:36px;justify-content:center;width:100%;max-width:1100px;}
  .col{display:flex;flex-direction:column;align-items:center;width:360px;max-width:92vw;}
  .col h2{font-size:1.1rem;margin:0 0 14px;}
  .col.A h2{color:var(--accentA);}
  .col.B h2{color:var(--accentB);}
  .wheel-wrap{position:relative;width:280px;height:280px;max-width:80vw;margin-bottom:18px;}
  .pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;z-index:5;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25));}
  .col.A .pointer{border-top:22px solid var(--accentA);}
  .col.B .pointer{border-top:22px solid var(--accentB);}
  canvas{width:100%;height:100%;border-radius:50%;box-shadow:0 0 0 5px var(--line),0 6px 16px rgba(0,0,0,.25);transition:transform 4.5s cubic-bezier(.17,.67,.21,1);}
  .hub{position:absolute;top:50%;left:50%;width:16%;height:16%;transform:translate(-50%,-50%);border-radius:50%;border:3px solid var(--line);z-index:4;}
  .col.A .hub{background:var(--accentA);}
  .col.B .hub{background:var(--accentB);}
  button.spin{font-family:inherit;font-size:1rem;font-weight:bold;padding:10px 28px;border-radius:999px;border:3px solid var(--line);color:#fff;cursor:pointer;transition:transform .08s;}
  .col.A button.spin{background:var(--accentA);box-shadow:0 4px 0 var(--line);}
  .col.B button.spin{background:var(--accentB);box-shadow:0 4px 0 var(--line);}
  button.spin:active{transform:translateY(3px);box-shadow:0 1px 0 var(--line);}
  button.spin:disabled{opacity:.6;cursor:not-allowed;}
  .result{margin-top:14px;min-height:2.8rem;font-size:.95rem;font-weight:bold;text-align:center;padding:0 6px;line-height:1.4;}
  .col.A .result{color:var(--accentA);}
  .col.B .result{color:var(--accentB);}
  .panel{margin-top:18px;width:100%;background:#1e1e1e;border:2px solid var(--line);border-radius:14px;padding:12px 14px;}
  details summary{font-size:.85rem;font-weight:bold;cursor:pointer;user-select:none;margin-bottom:6px;color:#aaa;}
  textarea{width:100%;min-height:130px;font-family:inherit;font-size:.75rem;border:1px solid #444;border-radius:8px;padding:8px;resize:vertical;background:#2a2a2a;color:#e8e0d8;}
  .panel-actions{display:flex;gap:8px;margin-top:8px;}
  .panel-actions button{font-size:.75rem;padding:6px 12px;border-radius:999px;border:2px solid #555;cursor:pointer;background:#2e2e2e;color:#e8e0d8;box-shadow:0 3px 0 #000;}
  .panel-actions button:active{box-shadow:0 1px 0 #000;transform:translateY(2px);}
  .combo-box{margin-top:30px;text-align:center;background:#1e1e1e;border:2.5px solid #444;border-radius:14px;padding:14px 20px;max-width:620px;width:90vw;}
  .combo-box .label{font-size:.8rem;opacity:.6;margin-bottom:6px;}
  .combo-box .combo-text{font-size:1rem;font-weight:bold;line-height:1.7;min-height:2rem;white-space:pre-line;}
</style>

<p class="sub">หมุนสองวงล้อแยกกัน แล้วเอามาผสมเป็นไอเดียเดียว</p>

function makeWheel(canvasId,storageKey,defaults,colors){
  const canvas=document.getElementById(canvasId);
  const ctx=canvas.getContext('2d');
  let items=[],currentRotation=0,spinning=false;
  function load(){try{const s=JSON.parse(localStorage.getItem(storageKey)||'null');items=(s&&s.length>=2)?s:defaults.slice();}catch(e){items=defaults.slice();}}
  load();
  function draw(){
    const n=items.length,cx=canvas.width/2,cy=canvas.height/2,r=canvas.width/2-6;
    const arc=(2*Math.PI)/n;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<n;i++){
      const start=i*arc;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+arc);ctx.closePath();
      ctx.fillStyle=colors[i%colors.length];ctx.fill();
      ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);
      ctx.textAlign='right';ctx.fillStyle='rgba(255,255,255,0.95)';
      ctx.font='bold 13px "Trebuchet MS",sans-serif';
      const label=items[i].length>22?items[i].slice(0,21)+'…':items[i];
      ctx.fillText(label,r-10,5);ctx.restore();
    }
  }
  draw();
  function spin(onDone){
    if(spinning||items.length<2)return;
    spinning=true;
    const n=items.length,arc=360/n;
    const winnerIndex=Math.floor(Math.random()*n);
    const sliceCenterDeg=winnerIndex*arc+arc/2;
    const extraSpins=5+Math.floor(Math.random()*3);
    const baseTurns=Math.floor(currentRotation/360)+extraSpins;
    const finalRotation=baseTurns*360+(270-sliceCenterDeg+360)%360;
    canvas.style.transition='transform 4.5s cubic-bezier(.17,.67,.21,1)';
    canvas.style.transform=`rotate(${finalRotation}deg)`;
    currentRotation=finalRotation;
    setTimeout(()=>{spinning=false;onDone(items[winnerIndex]);},4600);
  }
  function save(newItems){
    items=newItems;localStorage.setItem(storageKey,JSON.stringify(items));
    currentRotation=0;canvas.style.transition='none';canvas.style.transform='rotate(0deg)';draw();
  }
  function reset(){save(defaults.slice());}
  return{items:()=>items,spin,save,reset};
}

  const el=document.getElementById('comboText');
  if(lastA&&lastB) el.textContent=`"${lastA}"\nอยู่ใน\n"${lastB}"`;
  else if(lastA) el.textContent=`ตัวละคร: ${lastA}\n— หมุนวงล้อพื้นหลังด้วยนะ!`;
  else if(lastB) el.textContent=`พื้นหลัง: ${lastB}\n— หมุนวงล้อตัวละครด้วยนะ!`;
}

document.getElementById('spinA').addEventListener('click',()=>{
  document.getElementById('spinA').disabled=true;
  document.getElementById('resultA').textContent='🎲 กำลังสุ่ม...';
  wheelA.spin(p=>{document.getElementById('spinA').disabled=false;document.getElementById('resultA').textContent='🎯 '+p;lastA=p;updateCombo();});
});
document.getElementById('spinB').addEventListener('click',()=>{
  document.getElementById('spinB').disabled=true;
  document.getElementById('resultB').textContent='🎲 กำลังสุ่ม...';
  wheelB.spin(p=>{document.getElementById('spinB').disabled=false;document.getElementById('resultB').textContent='🎯 '+p;lastB=p;updateCombo();});
});
document.getElementById('saveA').addEventListener('click',()=>{
  const l=document.getElementById('boxA').value.split('\n').map(s=>s.trim()).filter(Boolean);
  if(l.length<2){alert('ใส่อย่างน้อย 2 รายการ');return;}
  wheelA.save(l);document.getElementById('resultA').textContent='';
});
document.getElementById('resetA').addEventListener('click',()=>{wheelA.reset();document.getElementById('boxA').value=wheelA.items().join('\n');document.getElementById('resultA').textContent='';});
document.getElementById('saveB').addEventListener('click',()=>{

  if(l.length<2){alert('ใส่อย่างน้อย 2 รายการ');return;}
  wheelB.save(l);document.getElementById('resultB').textContent='';
});
document.getElementById('resetB').addEventListener('click',()=>{wheelB.reset();document.getElementById('boxB').value=wheelB.items().join('\n');document.getElementById('resultB').textContent='';});
